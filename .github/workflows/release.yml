name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read # varsayılan kısıtlayıcı

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # changesets commit + tag oluşturur
      pull-requests: write # changesets version PR'ı oluşturur/günceller
      id-token: write # npm provenance attestation için OIDC token gerekli

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          # registry-url npm publish için registry kapsamını ayarlar.
          # Node 24, npm trusted publishing için gereken güncel npm CLI'ı sağlar.

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          title: 'chore: release packages'
          commit: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
