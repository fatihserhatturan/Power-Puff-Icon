name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read # varsayılan kısıtlayıcı

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # changesets commit + tag oluşturur
      pull-requests: write # changesets version PR'ı oluşturur/günceller
      id-token: write # npm provenance attestation için OIDC token gerekli

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          # registry-url zorunlu: setup-node bu sayede .npmrc'ye NODE_AUTH_TOKEN yazar
          # NODE_AUTH_TOKEN olmadan npm publish --provenance auth hatası verir

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          title: 'chore: release packages'
          commit: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
